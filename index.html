<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BopiFinder!</title>
    <link rel="icon" type="image/png" href="https://cdn.bopimo.com/static/images/favicon.png">

    <style>
        /* DELETE BUTTON CHANGES */
        :root {
            --bg: #111;
            --card: #1e1e1e;
            --text: white;
            --accent: #4da6ff;
        }

        [data-theme="light"] {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #222;
            --accent: #0066cc;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 20px 15px;
            margin: 0;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        h1 { margin: 0; font-size: 2.2em; }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
        }

        input {
            padding: 14px;
            width: 100%;
            max-width: 320px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            width: 100%;
            max-width: 320px;
        }

        .card {
            margin: 25px auto;
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            max-width: 360px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        img {
            border-radius: 50%;
            border: 5px solid var(--accent);
            width: 140px;
            height: 140px;
            object-fit: cover;
        }

        .result-name {
            font-size: 1.6em;
            margin: 12px 0 8px;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        #splash { font-style: italic; margin: 12px 0; min-height: 1.5em; }

        #history {
            margin: 20px auto;
            max-width: 360px;
            text-align: left;
        }

        .history-item {
            position: relative;
            padding: 12px 14px;
            background: var(--card);
            margin: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: var(--accent);
            color: white;
        }

        .delete-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 0, 0, 0.9);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            line-height: 1;
            display: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .history-item:hover .delete-btn {
            display: flex;
        }

        #result { min-height: 240px; }

        @media (max-width: 480px) {
            .card { padding: 20px 18px; }
            .delete-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BopiFinder</h1>
        <button class="toggle-btn" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>

    <p>Find Bopi's through UserID, Username, or Profile URL!</p>
    <p id="splash"></p>

    <input type="text" id="textbox" placeholder="Enter Username, ID, or Profile URL">
    <button id="search">Search</button>

    <div id="history"></div>
    <div id="result"></div>

    <br><br>
    <div style="font-size: 0.9em;">
        Website by <a href="https://geo-mzn.github.io/socials">GeoMzn</a> • 
        Bopimo! by Isaiah, Leon, and FireCat.<br>
        <a href="/changelog">Changelog</a> • <a href="/archives">Archives</a>
    </div>

    <div id="bpflink" style="display:none;"></div>

    <script>
        const version = "1.0.5";
        const resultDiv = document.getElementById("result");
        const splashEl = document.getElementById("splash");
        const linkEl = document.getElementById("bpflink");
        const textbox = document.getElementById("textbox");
        const historyDiv = document.getElementById("history");

        let searchHistory = JSON.parse(localStorage.getItem("bopifinder_history") || "[]");
        let pressTimer;

        const splashes = [
            `omg its bopifinder v${version}!`,
            "look its a bird",
            "'create on midnight ONLY' 😭🙏🥀",
            "BopiFinder by GeoMzn • Bopimo! by Isaiah, FireCat, and Leon",
            "i am in denial<br>his name was kyle",
            "current changes: circle delete button and new splash"
        ];

        function extractUsernameFromUrl(input) {
            try {
                let url;
                if (input.includes("://")) url = new URL(input);
                else if (input.startsWith("/")) url = new URL("https://bopimo.com" + input);
                else return null;

                const match = url.pathname.match(/\/(?:user|users)\/([^\/]+)/i);
                return match ? decodeURIComponent(match[1]).trim() : null;
            } catch (e) { return null; }
        }

        function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            document.getElementById("theme-toggle").textContent = theme === "light" ? "☀️" : "🌙";
        }

        setTheme(localStorage.getItem("theme") || "dark");

        document.getElementById("theme-toggle").addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme");
            setTheme(current === "light" ? "dark" : "light");
        });

        function saveToHistory(username, id) {
            const entry = { username, id, timestamp: Date.now() };
            searchHistory = searchHistory.filter(h => h.id !== id);
            searchHistory.unshift(entry);
            searchHistory = searchHistory.slice(0, 8);
            localStorage.setItem("bopifinder_history", JSON.stringify(searchHistory));
            renderHistory();
        }

        function deleteHistoryItem(id) {
            searchHistory = searchHistory.filter(h => h.id !== id);
            localStorage.setItem("bopifinder_history", JSON.stringify(searchHistory));
            renderHistory();
        }

        function renderHistory() {
            if (searchHistory.length === 0) return historyDiv.innerHTML = "";
            
            let html = `<strong>Recent Searches:</strong><br>`;
            searchHistory.forEach(item => {
                html += `
                    <div class="history-item" data-id="${item.id}">
                        ${item.username} <small>(ID: ${item.id})</small>
                        <button class="delete-btn" onclick="deleteHistoryItem(${item.id}); event.stopImmediatePropagation();">×</button>
                    </div>`;
            });
            historyDiv.innerHTML = html;

            // Click to search
            document.querySelectorAll(".history-item").forEach(el => {
                const id = el.dataset.id;

                // Normal click = search
                el.addEventListener("click", (e) => {
                    if (e.target.classList.contains("delete-btn")) return;
                    textbox.value = id;
                    document.getElementById("search").click();
                });

                // Long press to delete (mobile)
                el.addEventListener("mousedown", () => {
                    pressTimer = setTimeout(() => {
                        deleteHistoryItem(id);
                    }, 600);
                });

                el.addEventListener("mouseup", () => clearTimeout(pressTimer));
                el.addEventListener("mouseleave", () => clearTimeout(pressTimer));
                el.addEventListener("touchstart", () => {
                    pressTimer = setTimeout(() => deleteHistoryItem(id), 600);
                });
                el.addEventListener("touchend", () => clearTimeout(pressTimer));
            });
        }

        async function setRandomSplash() {
            const idx = Math.floor(Math.random() * splashes.length);
            if (idx === 4) {
                try {
                    const id = Math.floor(Math.random() * 5000) + 1;
                    const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(`https://www.bopimo.com/api/user/${id}`));
                    const u = await res.json();
                    if (res.ok) {
                        if (u?.username) {
                            splashEl.textContent = `Who's ${u.username}? Let's find out!`;
                            return;
                        }
                    }
                } catch {}
            }
            splashEl.textContent = splashes[idx];
        }

        window.copyBopifinderLink = function() {
            const btn = event.target;
            navigator.clipboard.writeText(linkEl.textContent).then(() => {
                const orig = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = orig, 1600);
            });
        };

        document.getElementById("search").addEventListener("click", async () => {
            let input = textbox.value.trim();
            if (!input) return;

            resultDiv.innerHTML = "<p>Loading...</p>";

            try {
                const extracted = extractUsernameFromUrl(input);
                if (extracted) input = extracted;

                let user;
                if (/^\d+$/.test(input)) {
                    const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(`https://www.bopimo.com/api/user/${input}`));
                    user = await res.json();
                } else {
                    const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(`https://www.bopimo.com/api/users?search=${encodeURIComponent(input)}`));
                    const json = await res.json();
                    if (!json?.data?.length) return resultDiv.innerHTML = "<h2>User not found.</h2>";
                    user = json.data[0];
                }

                let displayName = user.username;
                if (displayName === "BopiFinder") displayName = "Bopifinder (OFFICIAL)";
                if (displayName === "GeoMzn") displayName = "GeoMzn (BOPIFINDER CREATOR)";

                linkEl.textContent = `https://bopifinder.github.io/?user=${user.id}`;
                saveToHistory(displayName, user.id);

                resultDiv.innerHTML = `
                    <div class="card">
                        <img src="${user.bopi.headshot_url}" alt="${displayName}">
                        <div class="result-name">${displayName}</div>
                        <p><b>ID:</b> ${user.id}</p>
                        <p><b>Level:</b> ${user.level}</p>
                        <p><b>XP:</b> ${user.xp}</p>
                        <p><b>Status:</b> ${user.online ? "🟢 Online" : "🔴 Offline"}</p>
                        <p><a href="${user.url}" target="_blank">View Profile</a></p>
                        <p><a href="${user.bopi.bopi_url}" target="_blank">View Bopi</a></p>
                        <br>
                        <button onclick="copyBopifinderLink()">Copy BopiFinder! Link</button>
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = "<h2>Failed to fetch user. Try again.</h2>";
                console.error(err);
            }
        });

        // Auto search
        const params = new URLSearchParams(window.location.search);
        if (params.get("user")) {
            textbox.value = params.get("user");
            document.getElementById("search").click();
        }

        // Initialize
        setRandomSplash();
        renderHistory();
    </script>
</body>
</html>
