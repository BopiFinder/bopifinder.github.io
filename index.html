<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BopiFinder!</title>

    <link rel="icon" type="image/png"
        href="https://cdn.bopimo.com/static/images/favicon.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding: 40px;
        }

        input {
            padding: 10px;
            width: 250px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        .card {
            margin-top: 20px;
            display: inline-block;
            background: #222;
            padding: 20px;
            border-radius: 10px;
        }

        img {
            border-radius: 50%;
        }

        a {
            color: #4da6ff;
        }

        #bpflink {
            color: #111;
        }
    </style>
</head>
<body>
    <h1>BopiFinder</h1><br><br>
    <p>Find Bopi's through UserID or Username!</p>
    <p id="splash"></p>

    <input
        type="text"
        id="textbox"
        placeholder="Enter Username or ID">

    <button id="search">Search</button>

    <div id="result"></div>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <div>Website by <a href="https://www.bopimo.com/users/GeoMzn">GeoMzn</a>, Bopimo! made by Isaiah, Leon, and FireCat.<br><br><a href="/changelog">Changelog</a><br><a href="/archives">Archives</a></div>
    <div id="bpflink"></div>
    <script>
        const version = "1.0.2"
        const result = document.getElementById("result");
        let random
        const text = document.getElementById("bpflink");

        document.getElementById("search").addEventListener("click", async () => {
            const input = document
                .getElementById("textbox")
                .value
                .trim();

            if (!input) return;

            result.innerHTML = "Loading...";

            try {
                let user;

                if (/^\d+$/.test(input)) {
                    const res = await fetch(
                        "https://corsproxy.io/?" +
                        encodeURIComponent(
                            `https://www.bopimo.com/api/user/${input}`
                        )
                    );
                    user = await res.json();
                    text.textContent = `https://bopifinder.github.io/?user=${user.id}`
                } else {
                    const res = await fetch(
                        "https://corsproxy.io/?" +
                        encodeURIComponent(
                            `https://www.bopimo.com/api/users?search=${input}`
                        )
                    );
                    const json = await res.json();

                    if (!json.data.length) {
                        result.innerHTML = "<h2>User not found.</h2>";
                        return;
                    }

                    user = json.data[0];
                    text.textContent = `https://bopifinder.github.io/?user=${user.id}`
                }
                
                if (user.username === "BopiFinder") {
                    user.username = "Bopifinder (OFFICIAL)"
                }
                else if (user.username === "GeoMzn") {
                    user.username = "GeoMzn (BOPIFINDER CREATOR)"
                }
                    

                result.innerHTML = `
                    <div class="card">
                        <img src="${user.bopi.headshot_url}" width="128">

                        <h2>${user.username}</h2>

                        <p><b>ID:</b> ${user.id}</p>
                        <p><b>Level:</b> ${user.level}</p>
                        <p><b>XP:</b> ${user.xp}</p>
                        <p><b>Status:</b>
                            ${user.online ? "🟢 Online" : "🔴 Offline"}
                        </p>

                        <p>
                            <a href="${user.url}" target="_blank">
                                View Profile
                            </a>
                        </p>
                        <p><a href="${user.bopi.bopi_url}" target="_blank">View Bopi</a></p><br>
                        <button onClick="copyBopifinderLink()">Copy Bopifinder! Link</button>
                    </div>
                `;
            }
            catch (err) {
                result.innerHTML =
                    "<h2>Failed to fetch user.</h2>";
                console.error(err);
            }
        });
      const splashes = [
        `omg its bopifinder v${version}!`,
        "look its a bird",
        "'create on midnight ONLY' 😭🙏🥀",
        "BopiFinder by Geo_mzn, Bopimo! by Isaiah, FireCat, and Leon",
          `random thing`
      ]
      const splashGen = Math.floor(Math.random() * splashes.length);
      document.getElementById("splash").textContent = splashes[splashGen];
        (async () => {
            if (splashGen === 4) {
            const userGen = Math.floor(Math.random() * 25000) + 1;
            const res = await fetch(
                "https://corsproxy.io/?" +
                encodeURIComponent(
                    `https://www.bopimo.com/api/user/${userGen}`
                )
            );

            if (!res.ok) return;
            const user = await res.json();
            if (user && user.id) {
                random = user.username
                document.getElementById("splash").textContent = `Who's ${random}? I don't know, let's find out!`
            }
        }
                     })();
        
        const params = new URLSearchParams(window.location.search);
        const userParam = params.get("user");
        if (userParam) {
            document.getElementById("textbox").value = userParam;
            document.getElementById("search").click();
        }
        function copyBopifinderLink() {
            const btn = event.target;
            
            navigator.clipboard.writeText(text.textContent);
            btn.textContent = "Copied!";

            setTimeout(() => {
                btn.textContent = "Copy BopiFinder! Link";
            }, 1500);
        }
    </script>

</body>
</html>
