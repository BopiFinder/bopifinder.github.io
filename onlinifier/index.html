<!DOCTYPE html>
<html>
  <head>
    <title>Onlinifier!</title>
  </head>
  <body>
    <h1>Onlinifier!</h1>
    <h2>Make anyone on Bopimo! online, with 1 click!</h2>
    <input type="text" id="userId" placeholder="Enter a User ID here...">
    <input type="checkbox" id="isOnline">
    <label for="isOnline">Online?</label>
    <br><br><br><div>Get User ID's at <a href="https://bopifinder.github.io">BopiFinder!</a></div>
  </body>
  <script>
const checkbox = document.getElementById("isOnline");

checkbox.addEventListener("change", () => {
    const id = document.getElementById("userId").value;

    fetch(
        "https://corsproxy.io/?" +
        encodeURIComponent(
            `https://www.bopimo.com/api/users/${id}`
        ),
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                online: checkbox.checked
            })
        }
    );
});
</script>
</html>
